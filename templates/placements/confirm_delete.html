{% extends 'base.html' %}
{% block title %}Confirm Delete{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h2>⚠️ Confirm Delete</h2>
        <p>Are you sure you want to delete <strong>{{ obj }}</strong>?</p>
        <p class="text-danger">This action cannot be undone. All related applications will also be deleted.</p>

        <form method="POST">
            {% csrf_token %}
            <div class="form-actions">
                <button type="submit" class="btn btn-danger">Yes, Delete</button>
                <a href="{% url 'placements:drive_list' %}" class="btn btn-outline">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
