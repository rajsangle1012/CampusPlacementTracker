{% extends 'base.html' %}
{% block title %}Login – Campus Placement Tracker{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h2>Welcome Back</h2>
        <p class="subtitle">Login to your account</p>

        <form method="POST" action="{% url 'accounts:login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Enter username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter password">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Login</button>
        </form>

        <p class="auth-link">Don't have an account? <a href="{% url 'accounts:register' %}">Register as Student</a></p>
        <p class="auth-link small">TPO accounts are created by admin.</p>
    </div>
</div>
{% endblock %}
